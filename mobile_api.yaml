components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
  schemas:
    SuccElem:
      type: boolean
      description: Value of `true` if request was successful.
      example: true
    ErrElem:
      type: string
      description: |
        Description of error, if `succ == false` (value of `null` if request was
        successful).
      example: null
    InfoElem:
      type: string
      description: Informational message for successful requests.
      example: null
    RedirectObj:
      type: object
      description: |
        Non-binding directive to client for application area to redirect to.
      properties:
        redirect:
          type: string
          description: |
            Name of the application area where the outcome of the action will be reflected
            (can be thought of as the target of a logical redirect).  The value actually
            corresponds to the URL of the suggested application "view" (relative to
            endpoint root).  The root path itself ('/') signifies the "active" application
            area (mapped to the current tournament stage).
          example: {"redirect": "/<view path>"}
    ReloadObj:
      type: object
      description: |
        Non-binding directive to client to reload the data for this application area.
      properties:
        reloadTable:
          type: boolean
          description: |
            Indicates that the client-side data (typically a table or grid) should be
            reloaded (using the appropriate Ajax call).
          example: {"reloadTable": true}
    ActionResp:
      type: object
      description: |
        Response structure for action requests, including indicator of success and a
        logical application redirect.
      properties:
        succ:
          $ref: "#/components/schemas/SuccElem"
        err:
          $ref: "#/components/schemas/ErrElem"
        info:
          $ref: "#/components/schemas/InfoElem"
        data:
          $ref: "#/components/schemas/RedirectObj"
    TournData:
      type: object
      description: Tournament information.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
          example: 1
        name:
          type: string
          description: |
            Name must be unique across all tournaments; name can include spaces and
            punctuation (other than the slash character ‘/’).
          example: NOLA 2025
        dates:
          type: string
          description: Timeframe information.
          example: Oct 24-25, 2025
        venue:
          type: string
          description: Location information, for reference.
          example: Hotel St. Marie, New Orleans
        cur_stage:
          type: string
          description: Current stage of the tournament.
          example: Round robin results completed
        next_action:
          type: string
          description: Action indicating the end of the current stage.
          example: Tabulate round robin results
        players:
          type: integer
          description: Number of players.
          example: 42
        teams:
          type: integer
          description: Number of teams.
          example: 20
        thm_teams:
          type: integer
          description: Number of "three-headed monster" teams.
          example: 2
        seed_rounds:
          type: integer
          description: Number of rounds in the seeding stage.
          example: 8
        tourn_rounds:
          type: integer
          description: Number of rounds in the round robin stage.
          example: 8
        divisions:
          type: integer
          description: Number of divisions for the round robin stage.
          example: 2
      additionalProperties: true
    PlayerData:
      type: object
      description: Player information and seeding round stats.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
          example: 1
        first_name:
          type: string
          description: First name of player.
          example: Eric
        last_name:
          type: string
          description: Last name of player.
          example: Abernathy
        nick_name:
          type: string
          description: |
            Nick name by which the player will be listed in brackets, scoring sheets,
            leaderboards, etc.  If this field is specified as empty on record creation
            or update, it will be set to `last_name`.
          example: Abs
        reigning_champ:
          type: boolean
          description: |
            Signifies player as member of prior year winning team (used for partner
            assignment).
          example: false
        player_num:
          type: integer
          description: |
            "Player number" identifier based on ping pong ball selection, or randomly
            generated values.  This identifier is used in assigning the player to seeding
            bracket matchups.
          example: 25
        seed_wins:
          type: integer
          description: Wins during seeding round play.
        seed_losses:
          type: integer
          description: Losses during seeding round play.
        seed_pts_for:
          type: integer
          description: Total points scored during seeding round play.
        seed_pts_against:
          type: integer
          description: Total points by opponents during seeding round play.
        player_rank:
          type: integer
          description: |
            Rank computed after seeding round play (used to determine order of partner
            picks).  Value is `null` if seeding round is not complete.
          example: null
      additionalProperties: true
    SeedGameData:
      type: object
      description: |
        Seeding round game information.  Each record represents either an indidvidual
        matchup within the seeding bracket, or a placeholder indicating the player or
        players with byes for a given round.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
        label:
          type: string
          description: |
            Unique game identifier, prefixed by bracket indicator ("sd", "rr, "sf", "fn")
            followed by division (round robin only), round number, and table number.
            Record specifying teams having a bye for the round, will have "bye" indicated
            as the table number.
        round_num:
          type: integer
          description: |
            Round number for the tournament stage (up to 8, for seeding and round robin
            bracket play; up to 3 for playoff brackets).
        player_nums:
          type: string
          description: |
            Representation of the matchup, using "player number" identifiers.  The
            matchups are taken directly from precomputed bracket specifications (based on
            number of players and rounds).
        team1_name:
          type: string
          description:
        team2_name:
          type: string
          description:
        bye_players:
          type: string
          description: Name of player(s) with bye(s) for the round.
        team1_pts:
          type: integer
          description: |
            Number of points for Team 1 (`null` if game has not yet been played and/or
            completed).
        team2_pts:
          type: integer
          description: |
            Number of points for Team 2 (`null` if game has not yet been played and/or
            completed).
        winner:
          type: string
          description: |
            Name of the winning team (`null` if game has not yet been played and/or
            completed).
    SubmitScoreReq:
      type: object
      description: |
        Team scores (points) for seeding round game.
      properties:
        action:
          type: string
          description: Same as the target of the POST request ("submit_score").
        game_label:
          type: string
          description: Unique game identifier (from `cur_game` in the GET request).
        posted_by_num:
          type: integer
          description: |
            Player number identifier for the current user (from `user` in the GET
            request).
        team_idx:
          type: integer
          description: |
            Team index for current player (from `team_idx` in the GET request).
        team_pts:
          type: integer
          description: Number of points for player's team.
        opp_pts:
          type: integer
          description: Number of points for opposing team.
        ref_score_id:
          type: integer
          description: |
            Identifier for reference posted score record (from `ref_score_id` in
            the GET request).  Note that this will always be empty for `action ==
            submit_score`.
      required:
        - action
        - game_label
        - posted_by_num
        - team_idx
        - team_pts
        - opp_pts
        - ref_score_id
    AcceptScoreReq:
      type: object
      description: |
        Team scores (points) for seeding round game.
      properties:
        action:
          type: string
          description: Same as the target of the POST request ("accept_score").
        game_label:
          type: string
          description: Unique game identifier (from `cur_game` in the GET request).
        posted_by_num:
          type: integer
          description: |
            Player number identifier for the current user (from `user` in the GET
            request).
        team_idx:
          type: integer
          description: |
            Team index for current player (from `team_idx` in the GET request).
        team_pts:
          type: integer
          description: |
            Number of points for player's team (must be unchanged from `ref_score` in GET
            request).
        opp_pts:
          type: integer
          description: |
            Number of points for opposing team (must be unchanged from `ref_score` in GET
            request).
        ref_score_id:
          type: integer
          description: |
            Identifier for reference posted score record (from `ref_score_id` in the GET
            request).  Note that this must have a value for `action == accept_score`.
      required:
        - action
        - game_label
        - posted_by_num
        - team_idx
        - team_pts
        - opp_pts
        - ref_score_id
    CorrectScoreReq:
      type: object
      description: |
        Team scores (points) for seeding round game.
      properties:
        action:
          type: string
          description: Same as the target of the POST request ("correct_score").
        game_label:
          type: string
          description: Unique game identifier (from `cur_game` in the GET request).
        posted_by_num:
          type: integer
          description: |
            Player number identifier for the current user (from `user` in the GET
            request).
        team_idx:
          type: integer
          description: |
            Team index for current player (from `team_idx` in the GET request).
        team_pts:
          type: integer
          description: |
            Number of points for player's team (corrected).
        opp_pts:
          type: integer
          description: |
            Number of points for opposing team (corrected).
        ref_score_id:
          type: integer
          description: |
            Identifier for reference posted score record (from `ref_score_id` in the GET
            request).  Note that this must have a value for `action == correct_score`.
      required:
        - action
        - game_label
        - posted_by_num
        - team_idx
        - team_pts
        - opp_pts
        - ref_score_id
    RefScoreData:
      type: object
      description: |
        Entity used for participating teams to submit and accept game scores (allowing for
        corrections, if needed) before officially recording the result.
      properties:
        id:
          type: integer
        bracket:
          type: string
          description: Bracket for the game score.
          enum: [sd, rr, sf, fn]
        game_label:
          type: string
        post_action:
          type: string
          description: Action represented by this record.
          enum: [submit, accept, correct]
        team1_pts:
          type: integer
        team2_pts:
          type: integer
        posted_by:
          type: integer
          description: Player number identifier for player posting the score entry.
        team_idx:
          type: integer
          description: |
            Indicator of team for the player posting (`0` for Team 1; `1` for Team 2).
        do_push:
          type: boolean
          description: |
            Whether this record represents the score pushed to the official game result.
    Leaderboard:
      type: array
      description: |
        List of players or teams listed by current ranking.  The first item represents the
        header of the leaderboard, with each sub-element designating a column name.  The
        following items in the list represent player or team records (id, name, stats, and
        ranking).
      items:
        type: array
        description: |
          Team/player `id` is represented as an integer, all other field values are strings
          (i.e. numeric values are pre-formatted).
        oneOf:
          - type: integer
          - type: string
    TeamData:
      type: object
      description: |
        Team information and round robin game stats.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
          example: 13
        team_seed:
          type: integer
          description: |
            Overall team seed based on average rank of players.  This value is used for
            assignment to divisions, and seed within the division, which are mapped to
            precomputed round robin bracket matchups.
          example: 12
        player1:
          type: integer
          description: Player number identifier for player 1
          example: 25
        player2:
          type: integer
          description: Player number identifier for player 2
          example: 7
        team_name:
          type: string
          description: |
            Name of team, which is a concatenation of team member names (nick name or last
            name).
          example: Abs / Rooze
        div_num:
          type: integer
          description: Division to which team is assigned.
          example: 1
        div_seed:
          type: integer
          description: |
            Team's seed within the division (maps to games specified in precomputed
            bracket matchups).
          example: 6
        tourn_wins:
          type: integer
          description: Wins during round robin play.
          example: 5
        tourn_losses:
          type: integer
          description: Losses during round robin play.
          example: 0
        tourn_pts_for:
          type: integer
          description: Total points scored during round robin play.
          example: 50
        tourn_pts_against:
          type: integer
          description: Total points by opponents during round robin play.
          example: 30
        tourn_rank:
          type: integer
          description: |
            Overall team rank (based on win percentage and points percentage), computed
            after round robin play.  This value does not determine playoff teams, but is
            used as a factor in computing final tournament ranking.  Value is `null` if
            round robin play is not complete.
          example: 2
        div_rank:
          type: integer
          description: |
            Rank within the division, computed after round robin play.  Top two teams in
            each division will advance to the playoff round.  Value is `null` if round
            robin play is not complete.
          example: 2
        final_rank:
          type: integer
          description: |
            Final tournament rank, computed after playoff are complete.  Value is `null`
            if playoffs are not complete.
          example: null
      additionalProperties: true
    TournGameData:
      type: object
      description: |
        Round robin game information.  Each record represents either an indidvidual
        matchup within the round robin bracket, or a placeholder indicating a team that
        has a bye for a given round.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
        label:
          type: string
          description: |
            Unique game identifier, prefixed by bracket indicator ("sd", "rr, "sf", "fn")
            followed by division (round robin only), round number, and table number.
            Record specifying the team having a bye for the round, will have "bye"
            indicated as the table number.
        div_num:
          type: integer
          description: Division number for the game.
        round_num:
          type: integer
          description: |
            Round number for the tournament stage (up to 8, for round robin and round robin
            bracket play; up to 3 for playoff brackets).
        team_seeds:
          type: string
          description: |
            Representation of the matchup, using division seed for the teams.  The
            matchups are taken directly from precomputed bracket specifications (based on
            number of teams and rounds).
        team1_name:
          type: string
          description:
        team2_name:
          type: string
          description:
        bye_team:
          type: string
          description: Name of team with a bye for the round.
        team1_pts:
          type: integer
          description: |
            Number of points for Team 1 (`null` if game has not yet been played and/or
            completed).
        team2_pts:
          type: integer
          description: |
            Number of points for Team 2 (`null` if game has not yet been played and/or
            completed).
        winner:
          type: string
          description: |
            Name of the winning team (`null` if game has not yet been played and/or
            completed).
    PlayoffTeamData:
      type: object
      description: |
        Final four team information and playoff game stats.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
        tourn_rank:
          type: integer
          description: |
            Overall team rank based round robin play.  This value is used purely for
            identification purposes.
        player1:
          type: integer
          description: Player number identifier for player 1
        player2:
          type: integer
          description: Player number identifier for player 2
        team_name:
          type: string
          description: |
            Name of team, which is a concatenation of team member names (nick name or last
            name).
        div_num:
          type: integer
          description: Division to which team is assigned.
        div_rank:
          type: integer
          description: |
            Team's rank within the division after round robin play.  Each division's top
            ranked team plays the second ranked team from the other division in the
            semifinals.  The winners of each semis matchup play in the finals round.
        playoff_match_wins:
          type: integer
          description: Match wins during playoff rounds.
        playoff_match_losses:
          type: integer
          description: Match losses during playoff rounds.
        playoff_wins:
          type: integer
          description: Wins during playoff rounds.
        playoff_losses:
          type: integer
          description: Losses during playoff rounds.
        playoff_pts_for:
          type: integer
          description: Total points scored during playoff rounds.
        playoff_pts_against:
          type: integer
          description: Total points by opponents during playoff rounds.
        playoff_rank:
          type: integer
          description: |
            Final four team rank based on advancement and finals play (and win and points
            stats for third and fourth place).  Note that provisional values are computed
            during playoff play (based on win and points stats).
        final_rank:
          type: integer
          description: |
            Final four team rank based on advancement and finals play (and win and points
            stats for third and fourth place).  Note that provisional values are computed
            during playoff play (based on win and points stats).
      additionalProperties: true
    PlayoffGameData:
      type: object
      description: |
        Playofffs game information.  Each record represents an indidvidual matchup within
        the playoffs bracket.
      properties:
        id:
          type: integer
          description: Internal database id (should not be visible in app interfaces).
        label:
          type: string
          description: |
            Unique game identifier, prefixed by bracket indicator ("sd", "rr, "sf", "fn")
            followed by division (round robin only), round number, and table number.
            Record specifying the team having a bye for the round, will have "bye"
