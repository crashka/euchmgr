openapi: 3.1.1
info:
  title: Euchre Manager Mobile
  description: |
    This is the API for the Euchmgr Manager mobile functions.  The current working version
    (0.5) is based on the prototype mobile UI, and not designed top-down.  We will work to
    make it cleaner and more RESTful, if sufficiently supported by interest in creating
    alternative front-ends.  Note that there is a separate API for supporting admin
    (i.e. tournament operator-centric) applications.
  license:
    name: MIT License
    url: https://opensource.org/license/mit
  version: '0.5'

tags:
  - name: Security
    description: |
      User authentication and session management.
  - name: Registration
    description: |
      Player registration process and information.
  - name: Seeding
    description: |
      Seeding round game schedule and scores.
  - name: Partners
    description: |
      Partner picking process and tracking.
  - name: Round Robin
    description: |
      Round robin game schedule and scores.
  - name: Semifinals
    description: |
      Semifinals game schedule and scores.
  - name: Finals
    description: |
      Finals game schedule and scores.

paths:
  /login:
    post:
      tags:
        - Security
      summary: Authenticate mobile user (player) and create an app session.
      description:
      operationId: login
      requestBody:
        required: true
        description: A JSON object containing the username and password.
        content:
          application/json:
            schema:
              type: object
              description: Login information.
              properties:
                username:
                  type: string
                  description: Player username.
                password:
                  type: string
                  description: Player password.
              required:
                - username
                - password
            example:
              username: Abs
              password: <player password>
      security: []  # no authentication
      responses:
        "200":
          description: |
            Successfully authenticated.  The session ID is returned in a cookie named
            `session`.  This cookie must be passed in for all subsequent requests (in the
            HTTP header).
          headers:
            Set-Cookie:
              schema:
                type: string
                example: |
                  session=TGnTeNJk; Expires=26 Mar 2026 18:47:29 GMT; HttpOnly; Path=/
              description: Cookie attributes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                data: {"redirect": "/"}
  /logout:
    post:
      tags:
        - Security
      summary: Terminate a mobile user (player) app session.
      description:
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Successfully logged out.  The session cookie is no longer valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                info: User \"Abs\" logged out
                data: {"redirect": "/login"}
  /register:
    get:
      tags:
        - Registration
      summary: Get player registration information.
      description:
      operationId: getRegister
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Player registration information was successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                description:
                properties:
                  succ:
                    $ref: "#/components/schemas/SuccElem"
                  err:
                    $ref: "#/components/schemas/ErrElem"
                  info:
                    $ref: "#/components/schemas/InfoElem"
                  data:
                    type: object
                    properties:
                      view:
                        type: string
                        example: register
                      view_name:
                        type: string
                        example: Register
                      tourn:
                        $ref: "#/components/schemas/TournData"
                      user:
                        $ref: "#/components/schemas/PlayerData"
                      nums_avail:
                        type: array
                        items:
                          type: integer
                        example: [3, 5, 6, 8, 9, 11, 12, 13, 18, 25]
                additionalProperties: true
  /register/register_player:
    post:
      tags:
        - Registration
      summary: Provide player information for tournament registration.
      description:
      operationId: registerPlayer
      requestBody:
        required: true
        description: |
          A JSON object containing player data fields.  `id` must be specified (copied
          from `user` in the GET request) to identify the record to be updated.
        content:
          application/json:
            schema:
              type: object
              description: Player information for the registration process..
              properties:
                player_id:
                  type: integer
                  description: Internal database id (should not be visible in app interfaces).
                nick_name:
                  type: string
                  description: |
                    Name by which the player will be listed in brackets, scoring sheets,
                    leaderboards, etc.  If `nick_name` is not specified (or emptied out),
                    the player will be listed by last name.
                player_num:
                  type: integer
                  description: |
                    "Player number" identifier (based on ping pong ball selection or
                    randomly generated value).  This identifier is used in assigning the
                    player to seeding bracket matchups.
              required:
                - player_id
                - player_num
            example:
              player_id: 1
              player_num: 25
              nick_name: Abs
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Player information was successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                data: {"redirect": "/register"}
  /seeding:
    get:
      tags:
        - Seeding
      summary: Get seeding round data (games and leaderboard).
      description:
      operationId: getSeeding
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Seeding round data was successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                description: |
                  Response with seeding round game schedule/scores and current
                  leaderboard.
                properties:
                  succ:
                    $ref: "#/components/schemas/SuccElem"
                  err:
                    $ref: "#/components/schemas/ErrElem"
                  info:
                    $ref: "#/components/schemas/InfoElem"
                  data:
                    type: object
                    properties:
                      view:
                        type: string
                        example: seeding
                      view_name:
                        type: string
                        example: Seeding
                      tourn:
                        $ref: "#/components/schemas/TournData"
                      user:
                        $ref: "#/components/schemas/PlayerData"
                      team_idx:
                        type: integer
                        description: |
                          Indicator of team for the player in the current game (`0` for
                          Team 1; `1` for Team 2).
                      cur_game:
                        $ref: "#/components/schemas/SeedGameData"
                        example:
                          id: 21
                          label: "sd-2-10"
                          round_num: 2
                          table_num: 10
                          player1: 25
                          player2: 31
                          player3: 37
                          player4: 41
                          team1_name: "Abs / Cureton"
                          team2_name: "West / Leibly"
                          team1_pts: null
                          team2_pts: null
                          winner: null
                      stage_games:
                        type: array
                        items:
                          $ref: "#/components/schemas/SeedGameData"
                        example:
                          - id: 9
                            label: "sd-1-9"
                            round_num: 1
                            table_num: 9
                            player1: 14
                            player2: 18
                            player3: 25
                            player4: 29
                            team1_name: "DeWitt / Laves"
                            team2_name: "Abs / McGovern"
                            team1_pts: 10
                            team2_pts: 3
                            winner: "DeWitt / Laves"
                          - id: 21
                            label: "sd-2-10"
                            round_num: 2
                            table_num: 10
                            player1: 25
                            player2: 31
                            player3: 37
                            player4: 41
                            team1_name: "Abs / Cureton"
                            team2_name: "West / Leibly"
                            team1_pts: null
                            team2_pts: null
                            winner: null
                          - id: 30
                            label: "sd-3-8"
                            round_num: 3
                            table_num: 8
                            player1: 22
                            player2: 25
                            player3: 34
                            player4: 38
                            team1_name: "Shutts / Abs"
                            team2_name: "Watkins / Crash"
                            team1_pts: null
                            team2_pts: null
                            winner: null
                      leaderboard:
                        $ref: "#/components/schemas/Leaderboard"
                        example:
                          - ["id", "Player (num)", "W-L", "Pts %", "Rank"]
                          -
                            - [7, "Chisholm (26)", "1-0", "1.000", 1]
                            - [6, "Chesty (32)", "1-0", "1.000", 2]
                            - [15, "Harris (30)", "1-0", ".833", 3]
                            - [5, "Chess (33)", "1-0", ".833", 4]
  /seeding/submit_score:
    post:
      tags:
        - Seeding
      summary: Submit score for seeding round game.
      description:
      operationId: submitSeedScore
      requestBody:
        required: true
        description: |
          Seeding round score for the game identified by `game_label` (must be the current
          game for the player posting the score).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitScoreReq'
            example:
              action: submit_score
              game_label: sd-2-10
              posted_by_num: 25
              team_idx: 0
              team_pts: 10
              opp_pts: 7 
              ref_score_id: null
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Seeding round game score was successfully submitted.  The score will be
            officially recorded when opponent has accepted the result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/seeding"}
  /seeding/accept_score:
    post:
      tags:
        - Seeding
      summary: Accept currently posted score for seeding round game.
      description:
      operationId: acceptSeedScore
      requestBody:
        required: true
        description: |
          Seeding round score for the game identified by `game_label` (must be the current
          game for the player posting the score).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptScoreReq'
            example:
              action: accept_score
              game_label: sd-2-10
              posted_by_num: 37
              team_idx: 1
              team_pts: 7
              opp_pts: 10
              ref_score_id: 12
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Seeding round game score was successfully accepted.  The result has been
            pushed to the official game record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/seeding"}
  /seeding/correct_score:
    post:
      tags:
        - Seeding
      summary: Correct currently posted score for seeding round game.
      description:
      operationId: correctSeedScore
      requestBody:
        required: true
        description: |
          Seeding round score for the game identified by `game_label` (must be the current
          game for the player posting the score).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectScoreReq'
            example:
              action: correct_score
              game_label: sd-2-10
              posted_by_num: 37
              team_idx: 1
              team_pts: 8
              opp_pts: 10
              ref_score_id: 12
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Seeding round game score was successfully corrected.  The score will be
            officially recorded when opponent has accepted the result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/seeding"}
  /partners/:
    get:
      tags:
        - Partners
      summary: Get partners picking data.
      description:
      operationId: getPartners
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Partner picking data was successfully retrieved.  The `partner_picks` element
            (under `data`) contains a list of all players by ranking (from the seeding
            round):
            - Players with non-empty values for either `partner` or `picked_by` are
              already on a team.
            - The highest ranked player with both `partner` and `picked_by` still empty
              has the current pick, and may select any available player below them in the
              ranking order.
          content:
            application/json:
              schema:
                type: object
                description: |
                  Response with partner pick data (picks already made, current pick, and
                  players available as a partner).
                properties:
                  succ:
                    $ref: "#/components/schemas/SuccElem"
                  err:
                    $ref: "#/components/schemas/ErrElem"
                  info:
                    $ref: "#/components/schemas/InfoElem"
                  data:
                    type: object
                    properties:
                      view:
                        type: string
                        example: partners
                      view_name:
                        type: string
                        example: Partner Picks
                      tourn:
                        $ref: "#/components/schemas/TournData"
                      user:
                        $ref: "#/components/schemas/PlayerData"
                      cur_pick:
                        $ref: "#/components/schemas/PlayerData"
                        example:
                          id: 23
                          player_num: 29
                          player_rank: 2
                          nick_name: McGovern
                          partner: null
                          partner2: null
                          picked_by: null
                          seed_wins: 6
                          seed_losses: 1
                          seed_pts_for: 64
                          seed_pts_against: 41
                          seed_win_pct: 0.85714
                          seed_pts_pct: 0.60952
                      partner_picks:
                        type: array
                        items:
                          $ref: "#/components/schemas/PlayerData"
                        example:
                          - id: 10
                            player_num: 23
                            player_rank: 28
                            nick_name: Della Grotte
                            partner: 17
                            partner2: 9
                            picked_by: null
                            reigning_champ: true
                            seed_wins: 3
                            seed_losses: 4
                            seed_pts_for: 42
                            seed_pts_against: 57
                            seed_win_pct: 0.42857
                            seed_pts_pct: 0.42424
                          - id: 17
                            player_num: 4
                            player_rank: 1
                            nick_name: Heitner
                            partner: 32
                            partner2: null
                            picked_by: null
                            seed_wins: 7
                            seed_losses: 1
                            seed_pts_for: 70
                            seed_pts_against: 41
                            seed_win_pct: 0.875
                            seed_pts_pct: 0.63063
                          - id: 23
                            player_num: 29
                            player_rank: 2
                            nick_name: McGovern
                            partner: null
                            partner2: null
                            picked_by: null
                            seed_wins: 6
                            seed_losses: 1
                            seed_pts_for: 64
                            seed_pts_against: 41
                            seed_win_pct: 0.85714
                            seed_pts_pct: 0.60952
                          - id: 6
                            player_num: 32
                            player_rank: 3
                            nick_name: Chesty
                            partner: null
                            partner2: null
                            picked_by: 4
                            seed_wins: 6
                            seed_losses: 2
                            seed_pts_for: 66
                            seed_pts_against: 47
                            seed_win_pct: 0.75
                            seed_pts_pct: 0.58407
  /partners/pick_partner:
    post:
      tags:
        - Partners
      summary: Update partners data.
      description:
      operationId: postPartners
      requestBody:
        required: true
        description: |
          A JSON object containing partner selection information for the player with the
          current pick.  `id` must be specified to identify the record to be updated, and
          ***either*** `partner_num` ***or*** ` picks_info` should be specified to
          indicate the partner pick.
        content:
          application/json:
            schema:
              type: object
              description: Partner pick information.
              properties:
                player_num:
                  type: integer
                  description: Player number of player making the pick.
                partner_num:
                  type: integer
                  description: Player number of player selected as partner.
                picks_info:
                  type: [string, integer]
                  description: |
                    The current pick for partner, specified by either the player's rank or
                    name (or unique case-insensitive name prefix).
              oneOf:
                - required:
                    - player_num
                    - partner_num
                - required:
                    - player_num
                    - picks_info
            example:
              player_num: 29
              partner_num: null
              picks_info: dipesa
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Partner pick selection was successfully recorded.  The `data` element contains
            a directive for the client to reload the partner picks data (in order to pick
            up changes across multiple records).

            Note: later, we may return the full data set (or perhaps just the changed
            records).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/partners"}
  /round_robin:
    get:
      tags:
        - Round Robin
      summary: Get round robin round data.
      description:
      operationId: getRoundRobin
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Round Robin round game data was successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                description: |
                  Response with round robin game schedule/scores and current leaderboard.
                properties:
                  succ:
                    $ref: "#/components/schemas/SuccElem"
                  err:
                    $ref: "#/components/schemas/ErrElem"
                  info:
                    $ref: "#/components/schemas/InfoElem"
                  data:
                    type: object
                    properties:
                      view:
                        type: string
                      view_name:
                        type: string
                      tourn:
                        $ref: "#/components/schemas/TournData"
                      team:
                        $ref: "#/components/schemas/TeamData"
                      team_idx:
                        type: integer
                        description: |
                          Indicator of team for the current player (`0` for Team 1; `1`
                          for Team 2).
                      cur_game:
                        $ref: "#/components/schemas/TournGameData"
                        example:
                          id: 6
                          label: rr-1-2-1
                          div_num: 1
                          round_num: 2
                          table_num: 1
                          team1: 13
                          team2: 19
                          team1_div_seed: 6
                          team2_div_seed: 10
                          team1_name: Abs / Rooze
                          team2_name: Cooper / Frankel / Fields
                          team1_pts: null
                          team2_pts: null
                          winner: null
                      stage_games:
                        type: array
                        items:
                          $ref: "#/components/schemas/TournGameData"
                        example:
                          - id: 2
                            label: rr-1-1-2
                            div_num: 1
                            round_num: 1
                            table_num: 2
                            team1: 6
                            team2: 13
                            team1_div_seed: 2
                            team2_div_seed: 6
                            team1_name: Ramstad / Scruggs
                            team2_name: Abs / Rooze
                            team1_pts: 9
                            team2_pts: 10
                            winner: Abs / Rooze
                          - id: 6
                            label: rr-1-2-1
                            div_num: 1
                            round_num: 2
                            table_num: 1
                            team1: 13
                            team2: 19
                            team1_div_seed: 6
                            team2_div_seed: 10
                            team1_name: Abs / Rooze
                            team2_name: Cooper / Frankel / Fields
                            team1_pts: null
                            team2_pts: null
                            winner: null
                          - id: 11
                            label: rr-1-3-1
                            div_num: 1
                            round_num: 3
                            table_num: 1
                            team1: 4
                            team2: 13
                            team1_div_seed: 4
                            team2_div_seed: 6
                            team1_name: Chess / Obst
                            team2_name: Abs / Rooze
                            team1_pts: null
                            team2_pts: null
                            winner: null
                      leaderboard:
                        $ref: "#/components/schemas/Leaderboard"
                        example:
                          - ["id", "Team (seed)", "W-L", "Pts %", "Rank"]
                          -
                            - [12, "Springo / Leibly (7)", "5-0", ".667", 1]
                            - [13, "Abs / Rooze (6)", "5-0", ".625", 2]
                            - [1, "Heitner / Chisholm (1)", "4-1", ".550", 3]
                            - [19, "Cooper / Frankel / Fields (10)", "3-2", ".582", 4]
                            - [8, "Silberberg / Ponzio (5)", "3-2", ".528", 5]
  /round_robin/submit_score:
    post:
      tags:
        - Round Robin
      summary: Submit score for round robin round game.
      description:
      operationId: submitRoundRobinScore
      requestBody:
        required: true
        description: |
          Round Robin round score for the game identified by `game_label` (must be the current
          game for the player posting the score).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitScoreReq'
            example:
              action: submit_score
              game_label: rr-1-6-3
              posted_by_num: 25
              team_idx: 0
              team_pts: 10
              opp_pts: 7 
              ref_score_id: null
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Round Robin round game score was successfully submitted.  The score will be
            officially recorded when opponent has accepted the result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/round robin"}
  /round_robin/accept_score:
    post:
      tags:
        - Round Robin
      summary: Accept currently posted score for round robin round game.
      description:
      operationId: acceptRoundRobinScore
      requestBody:
        required: true
        description: |
          Round Robin round score for the game identified by `game_label` (must be the current
          game for the player posting the score).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptScoreReq'
            example:
              action: accept_score
              game_label: rr-1-6-3
              posted_by_num: 15
              team_idx: 1
              team_pts: 7
              opp_pts: 10
              ref_score_id: 12
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Round Robin round game score was successfully accepted.  The result has been
            pushed to the official game record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/round robin"}
  /round_robin/correct_score:
    post:
      tags:
        - Round Robin
      summary: Correct currently posted score for round robin round game.
      description:
      operationId: correctRoundRobinScore
      requestBody:
        required: true
        description: |
          Round Robin round score for the game identified by `game_label` (must be the current
          game for the player posting the score).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectScoreReq'
            example:
              action: correct_score
              game_label: rr-1-6-3
              posted_by_num: 15
              team_idx: 1
              team_pts: 8
              opp_pts: 10
              ref_score_id: 12
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Round Robin round game score was successfully corrected.  The score will be
            officially recorded when opponent has accepted the result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResp'
              example:
                succ: true
                err: null
                info: null
                data: {"redirect": "/round robin"}
  /semifinals:
    get:
      tags:
        - Semifinals
      summary: Get semifinals round data.
      description:
      operationId: getSemifinals
      security:
        - cookieAuth: []
      responses:
        "200":
          description: |
            Semifinals round game data was successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                description: |
                  Response with semifinals game schedule/scores and current leaderboard.
                properties:
                  succ:
                    $ref: "#/components/schemas/SuccElem"
                  err:
                    $ref: "#/components/schemas/ErrElem"
                  info:
                    $ref: "#/components/schemas/InfoElem"
                  data:
                    type: object
                    properties:
                      view:
                        type: string
                      view_name:
                        type: string
                      tourn:
                        $ref: "#/components/schemas/TournData"
                      team:
                        $ref: "#/components/schemas/PlayoffTeamData"
                        example:
                          id: 19
                          tourn_rank: 2
                          player1: 6
                          player2: 35
                          team_name: Romeo / Kramer
                          div_num: 2
                          div_rank: 1
                          playoff_match_wins: 0
                          playoff_match_losses: 0
                          playoff_wins: 1
                          playoff_losses: 1
                          playoff_pts_for: 17
